    <div class="login-container">
    <!-- Panel izquierdo -->
    <div class="left-panel">
        <div class="branding">
        <div class="logo-circle">A</div>
        <h1 class="title">ARMÓNICO</h1>
        <p class="subtitle">Café &amp; Restaurante</p>
        <hr class="divider" />
        </div>
    </div>

    <!-- Panel derecho -->
    <div class="right-panel">
        <div class="login-card">
        <h2 class="login-title">Inicia sesión:</h2>
        <p class="login-subtitle">Accede al sistema POS</p>

        <form (ngSubmit)="onLogin()" [formGroup]="loginForm" class="form">
            <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="text" formControlName="email" placeholder="Email" />
            </div>

            <div class="form-group">
            <label for="password">Contraseña</label>
            <input
                id="password"
                type="password"
                formControlName="password"
                placeholder="contraseña"
            />
            </div>

            <button type="submit" class="btn-login">Ingresar</button>
        </form>

        <div class="demo-credentials">
            <p>Email demo: <strong>admin@example.com</strong></p>
            <p>Contraseña: <strong>admin1234</strong></p>
        </div>  
        </div>
    </div>
    </div>
