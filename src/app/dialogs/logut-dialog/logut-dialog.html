<h2 mat-dialog-title>Cerrar Sesión</h2>

<mat-dialog-content>
    <p>¿Estás seguro que deseas cerrar sesión?</p>  
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button (click)="onCancel()">
        Cancelar
    </button>
    <button mat-raised-button color="warn" (click)="onConfirm()">
        Cerrar Sesión
    </button>
</mat-dialog-actions>
