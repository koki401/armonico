<h2 mat-dialog-title>Editar Categoria</h2>

<mat-dialog-content class="dialog-content">
    <form [formGroup]="form" class="form-grid">
        <mat-form-field appearance="fill" class="full">
            <mat-label>Nombre</mat-label>
            <input matInput formControlName="nombre" />
            @if (form.get('nombre')?.touched && form.get('nombre')?.invalid) {
            <mat-error>Nombre es requerido (máx. 120)</mat-error>
            }
        </mat-form-field>

        <mat-form-field appearance="fill" class="span-2">
            <mat-label>Descripción</mat-label>
            <textarea matInput rows="4" formControlName="descripcion"></textarea>
        </mat-form-field>
    </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="actions">
    <button mat-button class="btn-cancel" mat-dialog-close>Cancelar</button>
    <button mat-raised-button class="btn-save" (click)="guardar()">Guardar</button>
</mat-dialog-actions>
